version: 2

project_name: lazyleet

builds:
  - id: lazyleet
    main: ./cmd/lazyleet
    binary: lazyleet
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
        -X github.com/YalCorp/LazyLeet/internal/version.version={{ .Version }}
        -X github.com/YalCorp/LazyLeet/internal/version.commit={{ .Commit }}
        -X github.com/YalCorp/LazyLeet/internal/version.date={{ .CommitDate }}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc

gomod:
  proxy: true
